<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Warm paper background -->
  <rect width="32" height="32" rx="4" fill="#F6F1EA"/>

  <!-- Subtle paper texture — faint cross-hatch -->
  <g stroke="#EDE6DB" stroke-width="0.3" opacity="0.6">
    <line x1="4" y1="4" x2="28" y2="28"/>
    <line x1="8" y1="4" x2="28" y2="24"/>
    <line x1="4" y1="8" x2="24" y2="28"/>
    <line x1="28" y1="4" x2="4" y2="28"/>
    <line x1="24" y1="4" x2="4" y2="24"/>
    <line x1="28" y1="8" x2="8" y2="28"/>
  </g>

  <!--
    The ember: a single calligraphic flame shape drawn as a pen stroke.
    Suggests both a candle flame and a fountain pen nib — the dual
    metaphor of light and writing that defines Ember.
  -->
  <path
    d="M16 6
       C14 10, 10 13, 10 18
       C10 22, 12.5 26, 16 26
       C19.5 26, 22 22, 22 18
       C22 13, 18 10, 16 6Z"
    fill="none"
    stroke="#2C2825"
    stroke-width="1.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Inner glow — warm amber wash, the reading lamp -->
  <path
    d="M16 12
       C14.5 15, 13 17, 13 19.5
       C13 22, 14.5 24, 16 24
       C17.5 24, 19 22, 19 19.5
       C19 17, 17.5 15, 16 12Z"
    fill="#C49A3C"
    opacity="0.25"
  />

  <!-- Bright core — a tiny concentrated ember -->
  <ellipse
    cx="16" cy="20" rx="2" ry="2.5"
    fill="#C49A3C"
    opacity="0.45"
  />

  <!-- Cross-hatching on the flame for the hand-drawn feel -->
  <g stroke="#2C2825" stroke-width="0.4" opacity="0.3" stroke-linecap="round">
    <line x1="12" y1="17" x2="15" y2="20"/>
    <line x1="12.5" y1="19" x2="15" y2="22"/>
    <line x1="13.5" y1="21" x2="16" y2="24"/>
    <line x1="17" y1="20" x2="20" y2="17"/>
    <line x1="17" y1="22" x2="19.5" y2="19"/>
    <line x1="16.5" y1="24" x2="18.5" y2="21"/>
  </g>

  <!-- Pen-nib point at the base — the writing instrument -->
  <line
    x1="16" y1="24" x2="16" y2="27"
    stroke="#2C2825"
    stroke-width="0.8"
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>
