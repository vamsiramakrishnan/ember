# Ember — Supabase project configuration.
# Used by the Supabase CLI for local development and migrations.
# See: https://supabase.com/docs/guides/cli

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = false
