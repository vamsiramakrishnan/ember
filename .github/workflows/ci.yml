name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests with Coverage
        run: npx vitest run --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          total=$(du -sb dist/assets/*.js | awk '{s+=$1}END{print s}')
          echo "Total JS bundle: $(echo "$total / 1024" | bc)KB"
          if [ "$total" -gt 10485760 ]; then
            echo "::warning::Bundle size exceeds 10MB"
          fi
